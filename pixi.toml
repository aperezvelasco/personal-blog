[workspace]
authors = ["pereza <aperez@predictia.es>"]
channels = ["conda-forge"]
name = "pereza-blog"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
compile = { cmd = "python scripts/compile_blog.py" }

[environments]
dev = ["default"]

[dependencies]
python = ">=3.14.5,<3.15"
requests = ">=2.34.2,<3"
markdown = ">=3.10.2,<4"
python-frontmatter = ">=1.3.0,<2"
pre-commit = ">=4.6.0,<5"
black = ">=26.5.1,<27"
ruff = ">=0.15.14,<0.16"
arxiv = ">=1.4.8,<2"
google-genai = ">=2.6.0,<3"
